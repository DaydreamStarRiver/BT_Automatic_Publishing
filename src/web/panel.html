<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BT 发布控制台 v2.2</title>
<style>
:root, [data-theme="dark"] {
  --bg-primary: #0f1117; --bg-secondary: #1a1d27; --bg-tertiary: #232733;
  --bg-card: #1c1f2b; --bg-input: #161820; --bg-hover: #2a2e3b;
  --border: #2a2e3b; --border-focus: #6366f1;
  --text-primary: #e4e6ef; --text-secondary: #9498ad; --text-muted: #5e618d;
  --accent: #6366f1; --accent-hover: #818cf8; --accent-dim: rgba(99,102,241,.15);
  --success: #22c55e; --success-bg: rgba(34,197,94,.12);
  --warning: #f59e0b; --warning-bg: rgba(245,158,11,.12);
  --error: #ef4444; --error-bg: rgba(239,68,68,.12);
  --info: #3b82f6; --info-bg: rgba(59,130,246,.12);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.25); --shadow-md: 0 4px 16px rgba(0,0,0,.35);
  --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
  --log-bg: #0a0b10; --log-border: #22253a;
  --chip-bg: rgba(99,102,241,.12); --chip-text: #a5b4fc;
  --scrollbar-thumb: #33364a; --scrollbar-track: transparent;
}

[data-theme="light"] {
  --bg-primary: #f5f6fa; --bg-secondary: #ffffff; --bg-tertiary: #eef0f5;
  --bg-card: #ffffff; --bg-input: #f0f1f5; --bg-hover: #e8eaf0;
  --border: #dde0ea; --border-focus: #6366f1;
  --text-primary: #1a1d27; --text-secondary: #555b70; --text-muted: #99a0b8;
  --accent: #4f46e5; --accent-hover: #6366f1; --accent-dim: rgba(79,70,229,.1);
  --success: #16a34a; --success-bg: rgba(22,163,74,.08);
  --warning: #d97706; --warning-bg: rgba(217,119,6,.08);
  --error: #dc2626; --error-bg: rgba(220,38,38,.08);
  --info: #2563eb; --info-bg: rgba(37,99,235,.08);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08); --shadow-md: 0 4px 20px rgba(0,0,0,.1);
  --log-bg: #f8f9fb; --log-border: #dde0ea;
  --chip-bg: rgba(79,70,229,.08); --chip-text: #4f46e5;
  --scrollbar-thumb: #c0c4cf; --scrollbar-track: transparent;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  background: var(--bg-primary); color: var(--text-primary);
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
  line-height: 1.5;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

/* ═══ TopBar ═══ */
.topbar {
  flex-shrink: 0; height: 52px; background: var(--bg-secondary); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 16px; z-index: 100;
}
.topbar h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: -.02em; white-space: nowrap; }
.topbar .spacer { flex: 1; }
.topbar-stats { display: flex; gap: 12px; align-items: center; }
.stat-pill {
  font-size: .75rem; padding: 3px 10px; border-radius: 20px; font-weight: 600;
  background: var(--bg-tertiary); color: var(--text-secondary);
}
.stat-pill.success { background: var(--success-bg); color: var(--success); }
.stat-pill.error { background: var(--error-bg); color: var(--error); }
.stat-pill.warn { background: var(--warning-bg); color: var(--warning); }

.theme-switcher { display: flex; gap: 2px; background: var(--bg-tertiary); border-radius: 20px; padding: 2px; }
.theme-btn {
  width: 30px; height: 26px; border: none; border-radius: 17px; cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  background: transparent; transition: all .2s; opacity: .45;
}
.theme-btn:hover { opacity: .75; }
.theme-btn.active { background: var(--bg-card); box-shadow: var(--shadow-sm); opacity: 1; }

/* ═══ 主内容区 ═══ */
.main-body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* ═══ 左侧边栏：任务列表 ═══ */
.sidebar-left {
  width: 280px; flex-shrink: 0; background: var(--bg-secondary);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.sidebar-header strong { font-size: .85rem; color: var(--text-primary); }
.task-search {
  width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-input); color: var(--text-primary); font-size: .82rem; outline: none;
  transition: border-color .2s; margin-top: 10px;
}
.task-search:focus { border-color: var(--border-focus); }
.task-list { flex: 1; overflow-y: auto; padding: 8px; }

.task-item {
  padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; margin-bottom: 4px;
  border: 1px solid transparent; transition: all .15s; position: relative;
  background: var(--bg-card);
}
.task-item:hover { border-color: var(--border); background: var(--bg-hover); }
.task-item.active { border-color: var(--accent); background: var(--accent-dim); }
.task-item-name {
  font-size: .83rem; font-weight: 600; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; max-width: 230px;
}
.task-item-meta { font-size: .72rem; color: var(--text-muted); margin-top: 3px; display: flex; align-items: center; gap: 6px; }
.status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.status-dot.pending { background: var(--text-muted); }
.status-dot.running { background: var(--warning); animation: pulse 1.2s infinite; }
.status-dot.success { background: var(--success); }
.status-dot.failed { background: var(--error); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ═══ 文件信息卡片 ═══ */
.file-info-card { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--bg-tertiary); }
.info-label { font-size: .72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.info-value { font-size: .82rem; color: var(--text-primary); word-break: break-all; margin-bottom: 4px; }
.info-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: .77rem; }
.info-row .label { color: var(--text-muted); }
.info-row .value { color: var(--text-primary); font-weight: 500; }
.chips-area { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.param-chip {
  font-size: .71rem; padding: 3px 8px; border-radius: 4px;
  background: var(--chip-bg); color: var(--chip-text); font-weight: 600;
  font-family: 'Cascadia Code','Consolas',monospace;
}

/* ═══ 中间：发布编辑区 ═══ */
.center-panel {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  min-width: 420px; background: var(--bg-primary);
}
.center-scroll { flex: 1; overflow-y: auto; padding: 16px 20px; }

.section-title {
  font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
  color: var(--text-muted); margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px;
}
.section-icon { font-size: .85rem; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full-width { grid-column: 1 / -1; }
.form-label { font-size: .76rem; font-weight: 600; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
.form-label .hint { font-weight: 400; font-style: italic; color: var(--text-muted); font-size: .72rem; }
.form-input, .form-select, .form-textarea {
  padding: 8px 11px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-input); color: var(--text-primary); font-size: .84rem;
  outline: none; transition: border-color .2s; font-family: inherit;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--border-focus); box-shadow: 0 0 0 2px var(--accent-dim); }
.form-textarea { resize: vertical; min-height: 90px; line-height: 1.55; }
.form-row { display: flex; gap: 10px; }

.chip-container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 2px; }
.chip {
  font-size: .74rem; padding: 4px 10px; border-radius: 20px; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-secondary);
  transition: all .15s; user-select: none; white-space: nowrap;
}
.chip:hover { border-color: var(--accent); color: var(--accent-hover); }
.chip.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

.autofill-bar {
  display: flex; align-items: center; justify-content: space-between; padding: 8px 0;
  border-bottom: 1px solid var(--border); margin-bottom: 12px;
}
.autofill-bar span { font-size: .78rem; color: var(--text-secondary); }
.btn-autofill {
  padding: 5px 14px; border: 1px solid var(--accent); border-radius: 20px;
  background: transparent; color: var(--accent); font-size: .78rem; cursor: pointer;
  transition: all .2s; font-weight: 600; display: flex; align-items: center; gap: 4px;
}
.btn-autofill:hover { background: var(--accent); color: #fff; }

.md-toolbar { display: flex; gap: 6px; margin-bottom: 6px; }
.md-toggle {
  padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg-tertiary); color: var(--text-secondary); font-size: .73rem;
  cursor: pointer; transition: all .15s;
}
.md-toggle.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
.md-preview {
  padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-input); min-height: 90px; font-size: .84rem; line-height: 1.65;
  color: var(--text-primary); white-space: pre-wrap; word-break: break-word;
}

/* ═══ 右侧：发布控制区 ═══ */
.sidebar-right {
  width: 290px; flex-shrink: 0; background: var(--bg-secondary);
  border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
}
.right-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.right-section:last-child { border-bottom: none; flex: 1; display: flex; flex-direction: column; }

.site-list { display: flex; flex-direction: column; gap: 6px; }
.site-check {
  display: flex; align-items: center; gap: 8px; padding: 7px 10px;
  border-radius: var(--radius-sm); border: 1px solid transparent;
  cursor: pointer; transition: all .15s; background: var(--bg-card);
}
.site-check:hover { border-color: var(--border); background: var(--bg-hover); }
.site-check input[type="checkbox"] {
  width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;
}
.site-info { flex: 1; min-width: 0; }
.site-name { font-size: .82rem; font-weight: 600; color: var(--text-primary); }
.site-status { font-size: .7rem; color: var(--text-muted); }
.site-status.ok { color: var(--success); }
.site-status.err { color: var(--error); }

.toggle-wrap { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
.toggle-label { font-size: .81rem; color: var(--text-primary); }
.toggle-switch {
  position: relative; width: 40px; height: 22px; appearance: none; background: var(--bg-tertiary);
  border-radius: 11px; cursor: pointer; transition: background .2s; border: 1px solid var(--border);
}
.toggle-switch::after {
  content:''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
  background: var(--text-secondary); border-radius: 50%; transition: transform .2s;
}
.toggle-switch:checked { background: var(--accent); border-color: var(--accent); }
.toggle-switch:checked::after { transform: translateX(18px); background: #fff; }

.publish-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }
.btn-pub {
  width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: .85rem; font-weight: 700; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-pub.preview { background: var(--info-bg); color: var(--info); border-color: var(--info); }
.btn-pub.preview:hover { background: var(--info); color: #fff; }
.btn-pub.dryrun { background: var(--warning-bg); color: var(--warning); border-color: var(--warning); }
.btn-pub.dryrun:hover { background: var(--warning); color: #fff; }
.btn-pub.publish { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-pub.publish:hover { background: var(--accent-hover); }
.btn-pub:disabled { opacity: .4; cursor: not-allowed; }

.run-status {
  padding: 10px; border-radius: var(--radius-sm); text-align: center; font-size: .8rem;
  font-weight: 600; margin-top: 8px; display: none;
}
.run-status.show { display: block; }
.run-status.running { background: var(--warning-bg); color: var(--warning); }
.run-status.success { background: var(--success-bg); color: var(--success); }
.run-status.failed { background: var(--error-bg); color: var(--error); }

/* ═══ 底部日志区 ═══ */
.log-panel {
  flex-shrink: 0; height: 180px; border-top: 1px solid var(--border);
  background: var(--log-bg); display: flex; flex-direction: column; overflow: hidden;
}
.log-header {
  padding: 8px 16px; border-bottom: 1px solid var(--log-border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; background: var(--bg-secondary);
}
.log-header strong { font-size: .78rem; color: var(--text-secondary); }
.log-controls { display: flex; gap: 6px; align-items: center; }
.log-filter-btn {
  padding: 2px 8px; border: 1px solid var(--border); border-radius: 4px;
  background: transparent; color: var(--text-muted); font-size: .7rem; cursor: pointer;
}
.log-filter-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
.log-clear-btn {
  padding: 2px 8px; border: 1px solid var(--border); border-radius: 4px;
  background: transparent; color: var(--text-muted); font-size: .7rem; cursor: pointer;
}
.log-clear-btn:hover { color: var(--error); border-color: var(--error); }
.log-output {
  flex: 1; overflow-y: auto; padding: 8px 12px; font-family: 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
  font-size: .75rem; line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: var(--text-secondary);
}
.log-entry { margin-bottom: 2px; }
.log-time { color: var(--text-muted); margin-right: 8px; }
.log-level-info { color: var(--info); font-weight: 600; }
.log-level-warn { color: var(--warning); font-weight: 600; }
.log-level-error { color: var(--error); font-weight: 600; }

/* ═══ 空态 ═══ */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text-muted); padding: 30px; text-align: center;
}
.empty-state svg { width: 56px; height: 56px; opacity: .3; margin-bottom: 14px; }
.empty-state p { font-size: .88rem; line-height: 1.6; }

/* ═══ Modal ═══ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 999;
  display: none; align-items: center; justify-content: center; backdrop-filter: blur(3px);
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md); width: 640px; max-width: 92vw; max-height: 85vh;
  display: flex; flex-direction: column; overflow: hidden;
}
.modal-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-head h3 { font-size: .95rem; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.3rem; cursor: pointer; padding: 4px; line-height: 1; }
.modal-close:hover { color: var(--error); }
.modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.modal-foot { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.btn-modal {
  padding: 7px 18px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: .82rem; cursor: pointer; font-weight: 600; transition: all .15s;
  background: var(--bg-tertiary); color: var(--text-primary);
}
.btn-modal.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-modal.primary:hover { background: var(--accent-hover); }

/* ═══ Toast ═══ */
.toast-container { position: fixed; top: 60px; right: 20px; z-index: 1100; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 10px 18px; border-radius: var(--radius-sm); font-size: .82rem; font-weight: 500;
  box-shadow: var(--shadow-md); animation: slideIn .25s ease-out; max-width: 380px; color: #fff;
}
.toast.success { background: var(--success); }
.toast.error { background: var(--error); }
.toast.info { background: var(--info); }
.toast.warning { background: var(--warning); }
@keyframes slideIn { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }

@media (max-width: 1100px) {
  .sidebar-left { width: 240px; }
  .sidebar-right { width: 250px; }
  .center-panel { min-width: 340px; }
}
</style>
</head>
<body>

<!-- ═════ TopBar ═════ -->
<header class="topbar">
  <h1>🚀 BT 发布控制台</h1>
  <div class="spacer"></div>
  <div class="topbar-stats">
    <span class="stat-pill" id="statQueue">队列: -</span>
    <span class="stat-pill success" id="statOk">成功: -</span>
    <span class="stat-pill error" id="statFail">失败: -</span>
  </div>
  <div class="theme-switcher">
    <button class="theme-btn active" data-t="light" title="☀️ 白天模式">☀️</button>
    <button class="theme-btn" data-t="dark" title="🌙 黑夜模式">🌙</button>
  </div>
</header>

<!-- ═════ Main Body ═════ -->
<div class="main-body">

  <!-- ═══ 左侧：任务列表 ═══ -->
  <aside class="sidebar-left">
    <div class="sidebar-header">
      <strong>📋 任务列表</strong>
    </div>
    <input class="task-search" id="taskSearch" placeholder="搜索任务..." oninput="onSearchInput(this.value)" />
    <div class="task-list" id="taskList"></div>

    <!-- 文件信息卡片 -->
    <div class="file-info-card" id="fileInfoCard" style="display:none">
      <div class="info-label">📂 文件信息</div>
      <div class="info-value" id="fiName" style="font-weight:600;margin-bottom:8px"></div>
      <div class="info-row"><span class="label">大小</span><span class="value" id="fiSize"></span></div>
      <div class="info-row"><span class="label">路径</span><span class="value" id="fiPath" style="font-size:.72rem;word-break:break-all"></span></div>
      <div class="info-label" style="margin-top:10px">🎬 视频参数</div>
      <div class="chips-area" id="fiVideoChips"></div>
      <div class="info-label" style="margin-top:10px">📁 Torrent</div>
      <div class="info-row"><span class="label">大小</span><span class="value" id="fiTorrentSize"></span></div>
      <div class="info-row"><span class="label">文件数</span><span class="value" id="fiFileCount"></span></div>
      <div class="info-value" id="fiTorrentPath" style="font-size:.72rem;word-break:break-all;margin-top:4px"></div>
    </div>
  </aside>

  <!-- ═══ 中间：发布编辑区 ═══ -->
  <section class="center-panel">
    <div class="center-scroll" id="centerScroll">
      <!-- 空状态 -->
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 12h6m-3-3v6m-7 4h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        <p>请从左侧选择一个任务<br/>加载发布信息</p>
      </div>

      <!-- 发布表单区域 -->
      <div id="publishFormArea" style="display:none">
        <div class="autofill-bar">
          <span>✨ 自动填充（从文件名/元数据解析）</span>
          <button class="btn-autofill" onclick="doAutoFill()">🚀 立即填充</button>
        </div>

        <!-- 基本信息 -->
        <div class="section-title"><span class="section-icon">📝</span> 基本信息</div>
        <div class="form-grid">
          <div class="form-group full-width">
            <label class="form-label">标题 <span class="hint">（发布标题）</span></label>
            <input class="form-input" id="piTitle" placeholder="[Group] Title - 01 [Resolution][Codec][Source]" oninput="onFormInput()"/>
          </div>
          <div class="form-group full-width">
            <label class="form-label">副标题 <span class="hint">（可选）</span></label>
            <input class="form-input" id="piSubtitle" placeholder="副标题/英文名/中文名" oninput="onFormInput()"/>
          </div>
          <div class="form-group">
            <label class="form-label">发布组</label>
            <input class="form-input" id="piGroup" placeholder="例如: LoliHouse" oninput="onFormInput()"/>
          </div>
          <div class="form-group">
            <label class="form-label">分类</label>
            <select class="form-select" id="piCategory" onchange="onCategoryChange();onFormInput()">
              <option value="">-- 选择分类 --</option>
              <option value="Anime">Anime</option>
              <option value="Music">Music</option>
              <option value="Raw">Raw</option>
              <option value="Software">Software</option>
              <option value="Game">Game</option>
              <option value="Literature">Literature</option>
            </select>
          </div>
        </div>

        <!-- 媒体信息 -->
        <div class="section-title"><span class="section-icon">🎬</span> 媒体信息</div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">来源</label>
            <select class="form-select" id="piSource" onchange="onFormInput()">
              <option value="">-- 选择来源 --</option>
              <option value="WEB">WEB</option>
              <option value="BD">BD / BluRay</option>
              <option value="DVD">DVD</option>
              <option value="TV">TV</option>
              <option value="Raw">Raw</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">分辨率</label>
            <select class="form-select" id="piRes" onchange="onFormInput()">
              <option value="">-- 选择分辨率 --</option>
              <option value="4K">4K (2160p)</option>
              <option value="1080p">1080p</option>
              <option value="720p">720p</option>
              <option value="480p">480p</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">视频编码</label>
            <select class="form-select" id="piVCodec" onchange="onFormInput()">
              <option value="">-- 选择编码 --</option>
              <option value="H264">H264 / AVC</option>
              <option value="H265">H265 / HEVC</option>
              <option value="VP9">VP9</option>
              <option value="AV1">AV1</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">音频编码</label>
            <select class="form-select" id="piACodec" onchange="onFormInput()">
              <option value="">-- 选择音频 --</option>
              <option value="AAC">AAC</option>
              <option value="FLAC">FLAC</option>
              <option value="AC3">AC3</option>
              <option value="DTS">DTS</option>
              <option value="MP3">MP3</option>
            </select>
          </div>
          <div class="form-group full-width">
            <label class="form-label">字幕类型</label>
            <select class="form-select" id="piSub" onchange="onFormInput()">
              <option value="">-- 选择字幕 --</option>
              <option value="内嵌">内嵌字幕</option>
              <option value="外挂">外挂字幕</option>
              <option value="内嵌+外挂">内嵌+外挂</option>
              <option value="无">无字幕</option>
            </select>
          </div>
        </div>

        <!-- 标签 -->
        <div class="section-title"><span class="section-icon">🏷️</span> 标签</div>
        <div class="form-group">
          <label class="form-label">选择分类标签（可多选）</label>
          <div class="chip-container" id="tagChips">
            <span class="chip" data-tag="Anime" onclick="toggleTag(this)">Anime</span>
            <span class="chip" data-tag="Collection" onclick="toggleTag(this)">Collection</span>
            <span class="chip" data-tag="OVA" onclick="toggleTag(this)">OVA</span>
            <span class="chip" data-tag="Movie" onclick="toggleTag(this)">Movie</span>
            <span class="chip" data-tag="BD" onclick="toggleTag(this)">BD</span>
            <span class="chip" data-tag="TV" onclick="toggleTag(this)">TV</span>
            <span class="chip" data-tag="RAW" onclick="toggleTag(this)">RAW</span>
            <span class="chip" data-tag="Hi10P" onclick="toggleTag(this)">Hi10P</span>
            <span class="chip" data-tag="HDR" onclick="toggleTag(this)">HDR</span>
            <span class="chip" data-tag="SDR" onclick="toggleTag(this)">SDR</span>
          </div>
        </div>

        <!-- 海报 & 关于 -->
        <div class="section-title"><span class="section-icon">🖼️</span> 附加信息</div>
        <div class="form-grid">
          <div class="form-group full-width">
            <label class="form-label">海报链接 <span class="hint">（动漫花园专用）</span></label>
            <input class="form-input" id="piPoster" placeholder="https://....jpg" oninput="onFormInput()"/>
          </div>
          <div class="form-group full-width">
            <label class="form-label">关于/联系方式 <span class="hint">（Nyaa专用）</span></label>
            <input class="form-input" id="piAbout" placeholder="About / Contact info" oninput="onFormInput()"/>
          </div>
        </div>

        <!-- 简介 -->
        <div class="section-title"><span class="section-icon">📄</span> 发布简介</div>
        <div class="md-toolbar">
          <button class="md-toggle active" id="mdEditBtn" onclick="switchMD('edit')">编辑</button>
          <button class="md-toggle" id="mdPrevBtn" onclick="switchMD('preview')">预览</button>
        </div>
        <textarea class="form-textarea" id="piDescEdit" placeholder="使用 Markdown 格式填写发布内容..." oninput="onDescInput()" style="min-height:150px"></textarea>
        <div class="md-preview" id="piDescPreview" style="display:none"></div>
      </div>
    </div>
  </section>

  <!-- ═══ 右侧：发布控制区 ═══ -->
  <aside class="sidebar-right">
    <div class="right-section">
      <div class="section-title"><span class="section-icon">🌐</span> 发布站点</div>
      <div class="site-list" id="siteList"></div>
    </div>

    <div class="right-section">
      <div class="section-title"><span class="section-icon">⚙️</span> 发布选项</div>
      <div class="toggle-wrap">
        <span class="toggle-label">自动确认</span>
        <input type="checkbox" class="toggle-switch" id="optAutoConfirm" checked/>
      </div>
    </div>

    <div class="right-section">
      <div class="section-title"><span class="section-icon">🚀</span> 发布操作</div>
      <div class="publish-buttons">
        <button class="btn-pub preview" id="btnPreview" onclick="doAction('preview')" disabled>👁️ 预览发布</button>
        <button class="btn-pub dryrun" id="btnDryRun" onclick="doAction('dry_run')" disabled>🔧 试运行</button>
        <button class="btn-pub publish" id="btnPublish" onclick="doAction('publish')" disabled>✅ 正式发布</button>
      </div>
      <div class="run-status" id="runStatus"></div>
    </div>
  </aside>
</div>

<!-- ═══ 底部日志区 ═══ -->
<div class="log-panel">
  <div class="log-header">
    <strong>📜 运行日志</strong>
    <div class="log-controls">
      <button class="log-filter-btn active" data-lvl="all" onclick="setLogFilter('all')">全部</button>
      <button class="log-filter-btn" data-lvl="INFO" onclick="setLogFilter('INFO')">INFO</button>
      <button class="log-filter-btn" data-lvl="WARN" onclick="setLogFilter('WARN')">WARN</button>
      <button class="log-filter-btn" data-lvl="ERROR" onclick="setLogFilter('ERROR')">ERROR</button>
      <button class="log-clear-btn" onclick="clearLogs()">清空</button>
    </div>
  </div>
  <div class="log-output" id="logOutput"></div>
</div>

<!-- ═══ 预览模态框 ═══ -->
<div class="modal-overlay" id="previewModal">
  <div class="modal-box">
    <div class="modal-head">
      <h3>📋 发布预览</h3>
      <button class="modal-close" onclick="closePreviewModal()">×</button>
    </div>
    <div class="modal-body" id="previewBody"></div>
    <div class="modal-foot">
      <button class="btn-modal" onclick="closePreviewModal()">关闭</button>
    </div>
  </div>
</div>

<!-- ═══ Toast ═══ -->
<div class="toast-container" id="toastContainer"></div>

<script>
const API_BASE = '/api';
const $ = id => document.getElementById(id);

const state = {
  tasks: [],
  sites: [],
  currentTaskId: null,
  selectedTags: new Set(),
  formDirty: false,
  logEntries: [],
  logFilter: 'all',
  isPolling: false,
};

function api(url, opts = {}) {
  return fetch(API_BASE + url, {
    headers: Object.assign({'Content-Type': 'application/json'}, opts.headers || {}),
    ...opts,
  }).then(r => r.ok ? r.json() : r.json().then(d => Promise.reject(d)));
}

function fmtBytes(bytes) {
  if (!bytes || bytes === 0) return '-';
  const u = ['B','KB','MB','GB','TB']; let i = 0;
  while (bytes >= 1024 && i < u.length - 1) { bytes /= 1024; i++; }
  return bytes.toFixed(i === 0 ? 0 : 1) + ' ' + u[i];
}

function esc(s) { if (s == null) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function nowStr() { return new Date().toLocaleTimeString('en-US', {hour12:false}); }

function toast(msg, type = 'info') {
  const c = $('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`; el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function statusClass(st) {
  return {'new':'pending','pending':'pending','running':'running','uploading':'running',
          'torrent_creating':'running','torrent_created':'pending',
          'success':'success','failed':'failed','permanent_failed':'failed'}[st] || 'pending';
}

function statusLabel(st) {
  const m = {'new':'新建','pending':'待处理','running':'运行中','uploading':'上传中',
             'torrent_creating':'生成中','torrent_created':'待发布',
             'success':'成功','failed':'失败','permanent_failed':'永久失败'};
  return m[st] || st;
}

function rowHTML(label, value) {
  if (!value && value !== 0) return '';
  return `<tr><td style="color:var(--text-muted);padding:3px 8px 3px 0;width:100px">${esc(label)}</td><td style="font-weight:500">${esc(String(value))}</td></tr>`;
}

// ═══ 主题系统 ═══
(function initTheme() {
  const saved = localStorage.getItem('bt_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.t === saved);
  });
})();
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.onclick = () => {
    const t = btn.dataset.t;
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('bt_theme', t);
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.t === t));
  };
});

// ═══ 日志系统 ═══
function addLog(msg, lvl = 'INFO') {
  state.logEntries.push({ time: nowStr(), level: lvl, msg });
  renderLog();
}

function renderLog() {
  const out = $('logOutput');
  const filtered = state.logFilter === 'all'
    ? state.logEntries : state.logEntries.filter(e => e.level === state.logFilter);
  out.innerHTML = filtered.map(e =>
    `<div class="log-entry"><span class="log-time">${esc(e.time)}</span>` +
    `<span class="log-level-${e.level.toLowerCase()}">${e.level}</span> ${esc(e.msg)}</div>`
  ).join('');
  out.scrollTop = out.scrollHeight;
}

function setLogFilter(lvl) {
  state.logFilter = lvl;
  document.querySelectorAll('.log-filter-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lvl === lvl));
  renderLog();
}

function clearLogs() { state.logEntries = []; renderLog(); }

// ═══ 站点加载 ═══
async function loadSites() {
  try {
    const d = await api('/api/sites');
    state.sites = d.sites || [];
    renderSites();
  } catch (e) { addLog(`站点加载失败: ${e.message}`, 'ERROR'); }
}

function renderSites() {
  const el = $('siteList');
  if (!state.sites.length) {
    el.innerHTML = `<div style="font-size:.78rem;color:var(--text-muted);padding:8px">暂无站点配置</div>`;
    return;
  }
  el.innerHTML = state.sites.map(s => `
    <label class="site-check">
      <input type="checkbox" name="sites" value="${esc(s.name)}" checked onchange="onSiteChange()"/>
      <div class="site-info">
        <div class="site-name">${esc(s.name)} <span style="font-size:.7rem;color:var(--text-muted)">(${esc(s.type||'')})</span></div>
        <div class="site-status ${s.has_cookies ? 'ok' : 'err'}">
          ${s.has_cookies ? '● 已登录' : '○ 未登录'}
        </div>
      </div>
    </label>
  `).join('');
}

function getSelectedSites() {
  return [...document.querySelectorAll('input[name="sites"]:checked')].map(el => el.value);
}

// ═══ 任务系统 ═══
async function loadTasks() {
  try {
    const d = await api('/api/tasks?limit=100&offset=0');
    state.tasks = d.tasks || [];
    renderTaskList();
    updateStats(d);
  } catch (e) { addLog(`任务加载失败: ${e.message}`, 'ERROR'); }
}

function renderTaskList(filterText = '') {
  const el = $('taskList');
  const f = filterText.toLowerCase();
  const filtered = f
    ? state.tasks.filter(t => (t.video_path||'').toLowerCase().includes(f) || t.id.includes(f))
    : state.tasks;

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state" style="padding:20px"><p>${f?'无匹配任务':'暂无任务'}</p></div>`;
    return;
  }

  el.innerHTML = filtered.map(t => {
    const sc = statusClass(t.status);
    const nm = (t.video_path || '').replace(/\\/g, '/').split('/').pop();
    return `<div class="task-item ${t.id === state.currentTaskId ? 'active' : ''}" onclick="selectTask('${t.id}')">
      <div style="display:flex;align-items:center">
        <span class="status-dot ${sc}"></span>
        <span class="task-item-name" title="${esc(t.video_path || '')}">${esc(nm || t.id)}</span>
      </div>
      <div class="task-item-meta">
        <span>${statusLabel(t.status)}</span>
      </div>
    </div>`;
  }).join('');
}

function onSearchInput(val) { renderTaskList(val); }

function updateStats(d) {
  $('statQueue').textContent = `队列: ${state.tasks.length}`;
  $('statOk').textContent = `成功: ${d?.stats?.success_count ?? '?'}`;
  $('statFail').textContent = `失败: ${d?.stats?.failed_count ?? '?'}`;
}

async function selectTask(taskId) {
  state.currentTaskId = taskId;
  state.formDirty = false;
  renderTaskList();

  try {
    const task = await api(`/api/tasks/${taskId}`);
    fillPublishInfo(task);
    fillFileInfo(task);
    enableControls(true);
    showRunStatus(task);
    addLog(`已加载任务: ${task.video_path || taskId}`, 'INFO');

    $('emptyState').style.display = 'none';
    $('publishFormArea').style.display = '';
    $('fileInfoCard').style.display = '';

  } catch (e) {
    toast('加载任务详情失败: ' + e.message, 'error');
    enableControls(false);
  }
}

function enableControls(on) {
  $('btnPreview').disabled = !on;
  $('btnDryRun').disabled = !on;
  $('btnPublish').disabled = !on;
}

// ═══ 发布表单 ═══
function fillPublishInfo(task) {
  const p = task.publish_info || {};
  const vm = task.video_meta || {};

  $('piTitle').value = p.title || '';
  $('piSubtitle').value = p.subtitle || '';
  $('piGroup').value = p.group_name || '';
  $('piPoster').value = p.poster || '';
  $('piSource').value = p.source || '';
  $('piRes').value = vm.resolution || p.resolution || '';
  $('piVCodec').value = vm.codec || p.video_codec || '';
  $('piACodec').value = p.audio_codec || '';
  $('piSub').value = p.subtitle_type || '';
  $('piCategory').value = p.category || '';
  $('piAbout').value = p.about || '';
  $('piDescEdit').value = p.description || '';
  $('piDescPreview').textContent = p.description || '(空)';
  $('optAutoConfirm').checked = true;

  state.selectedTags.clear();
  if (p.tags) {
    p.tags.split(',').map(s => s.trim()).filter(Boolean).forEach(t => state.selectedTags.add(t));
  }
  renderTags();
  switchMD('edit');
}

function getFormData() {
  return {
    title: $('piTitle').value.trim(),
    subtitle: $('piSubtitle').value.trim(),
    group_name: $('piGroup').value.trim(),
    poster: $('piPoster').value.trim(),
    source: $('piSource').value,
    resolution: $('piRes').value,
    video_codec: $('piVCodec').value,
    audio_codec: $('piACodec').value,
    subtitle_type: $('piSub').value,
    category: $('piCategory').value,
    about: $('piAbout').value.trim(),
    description: $('piDescEdit').value,
    tags: [...state.selectedTags].join(', '),
  };
}

async function savePubInfo() {
  if (!state.currentTaskId) return;
  const body = getFormData();
  try {
    await api(`/api/tasks/${state.currentTaskId}/publish_info`, {
      method: 'PUT', body: JSON.stringify(body),
    });
    state.formDirty = false;
  } catch (e) { toast('保存失败: ' + (e.detail || e.message), 'error'); }
}

function onFormInput() { state.formDirty = true; }

function toggleTag(chip) {
  const tag = chip.dataset.tag;
  if (state.selectedTags.has(tag)) { state.selectedTags.delete(tag); chip.classList.remove('selected'); }
  else { state.selectedTags.add(tag); chip.classList.add('selected'); }
  state.formDirty = true;
}

function renderTags() {
  document.querySelectorAll('#tagChips .chip').forEach(c => {
    c.classList.toggle('selected', state.selectedTags.has(c.dataset.tag));
  });
}

function onCategoryChange() {
  const cat = $('piCategory').value;
  if (cat && !state.selectedTags.has(cat)) {
    state.selectedTags.add(cat);
    renderTags();
  }
}

let mdTimer = null;
function switchMD(mode) {
  const edit = $('piDescEdit'), prev = $('piDescPreview');
  const eb = $('mdEditBtn'), pb = $('mdPrevBtn');
  if (mode === 'edit') {
    edit.style.display = ''; prev.style.display = 'none';
    eb.classList.add('active'); pb.classList.remove('active');
  } else {
    edit.style.display = 'none'; prev.style.display = '';
    prev.textContent = edit.value || '(空)';
    eb.classList.remove('active'); pb.classList.add('active');
  }
}

function onDescInput() {
  state.formDirty = true;
  clearTimeout(mdTimer);
  mdTimer = setTimeout(() => {
    $('piDescPreview').textContent = $('piDescEdit').value || '(空)';
  }, 300);
}

// ═══ AutoFill ═══
async function doAutoFill() {
  if (!state.currentTaskId) { toast('请先选择任务', 'warning'); return; }
  addLog('⏳ 正在自动解析...', 'INFO');
  try {
    await api(`/api/tasks/${state.currentTaskId}/autofill`);
    await selectTask(state.currentTaskId);
    toast('自动填充完成', 'success');
    addLog('✅ AutoFill 完成', 'INFO');
  } catch (e) {
    toast('AutoFill 失败: ' + (e.detail || e.message), 'error');
    addLog(`❌ AutoFill 失败: ${e.detail || e.message}`, 'ERROR');
  }
}

// ═══ 文件信息 ═══
function fillFileInfo(task) {
  const vm = task.video_meta || {};
  const tm = task.torrent_meta || {};
  const nm = (task.video_path || '').split(/[/\\]/).pop();

  $('fiName').textContent = nm;
  $('fiSize').textContent = fmtBytes(vm.file_size);
  $('fiPath').textContent = task.video_path || '';

  let chips = '';
  if (vm.codec) chips += `<span class="param-chip">${esc(vm.codec)}</span>`;
  if (vm.resolution) chips += `<span class="param-chip">${esc(vm.resolution)}</span>`;
  if (vm.duration_seconds) chips += `<span class="param-chip">${vm.duration_seconds}s</span>`;
  if (vm.width && vm.height) chips += `<span class="param-chip">${vm.width}x${vm.height}</span>`;
  if (!chips) chips = '<span style="font-size:.75rem;color:var(--text-muted)">暂无</span>';
  $('fiVideoChips').innerHTML = chips;

  $('fiTorrentSize').textContent = fmtBytes(tm.size);
  $('fiFileCount').textContent = tm.file_count != null ? String(tm.file_count) : '-';
  const tp = task.torrent_path || '';
  $('fiTorrentPath').textContent = tp ? tp.split(/[/\\]/).pop() : '(未生成)';
  $('fiTorrentPath').title = tp;
}

// ═══ 发布操作 ═══
async function doAction(mode) {
  if (!state.currentTaskId) return;
  const sites = getSelectedSites();
  if (!sites.length && mode === 'publish') {
    toast('请至少选择一个发布站点', 'warning'); return;
  }

  await savePubInfo();

  const modeNames = { preview: '预览', dry_run: '试运行', publish: '正式发布' };
  addLog(`▶️ 开始${modeNames[mode]}...`, 'INFO');
  setRunStatus('running', `${modeNames[mode]}中...`);

  try {
    const body = { mode, auto_confirm: $('optAutoConfirm').checked };

    if (mode === 'preview') {
      const result = await api(`/api/tasks/${state.currentTaskId}/preview`, { method: 'POST' });
      showPreviewModal(result);
      setRunStatus('success', `预览完成`);
      addLog('✅ 预览完成', 'INFO');
    } else {
      body.sites = sites;
      await api(`/api/tasks/${state.currentTaskId}/okp_run`, {
        method: 'POST', body: JSON.stringify(body),
      });
      toast(`${modeNames[mode]}已启动`, mode === 'publish' ? 'info' : 'warning');
      addLog(`${modeNames[mode]}已启动 (sites: ${sites.join(', ')||'无'})`, 'INFO');
      startPolling();
    }
  } catch (e) {
    const msg = e.detail || e.message;
    toast(`${modeNames[mode]}失败: ${msg}`, 'error');
    setRunStatus('failed', msg);
    addLog(`❌ ${modeNames[mode]}失败: ${msg}`, 'ERROR');
  }
}

function setRunStatus(status, msg) {
  const el = $('runStatus');
  el.className = `run-status show ${status}`;
  el.textContent = msg;
}

function showRunStatus(task) {
  if (!task.okp_result) { $('runStatus').className = 'run-status'; return; }
  const r = task.okp_result;
  if (r.success) setRunStatus('success', `上次: 成功 (${r.mode})`);
  else setRunStatus('failed', r.error || '上次: 失败');
}

function startPolling() {
  if (state.isPolling) return;
  state.isPolling = true;
  const timer = setInterval(async () => {
    if (!state.currentTaskId) { clearInterval(timer); state.isPolling = false; return; }
    try {
      const task = await api(`/api/tasks/${state.currentTaskId}`);
      showRunStatus(task);
      if (!['running','uploading','pending','new','torrent_creating'].includes(task.status)) {
        clearInterval(timer);
        state.isPolling = false;
        const sc = statusClass(task.status);
        setRunStatus(sc, statusLabel(task.status));
        addLog(`🏁 任务结束: ${statusLabel(task.status)}`, sc==='success'?'INFO':'ERROR');
        toast(`任务结束: ${statusLabel(task.status)}`, task.status==='success'?'success':'error');
        loadTasks();
      }
    } catch (_) {}
  }, 3000);
}

// ═══ 预览模态框 ═══
function showPreviewModal(data) {
  const pi = data.publish_info || {};
  const vm = data.video_meta || {};
  const ti = data.torrent_info || {};

  $('previewBody').innerHTML = `
    <div style="margin-bottom:16px">
      <div class="info-label" style="margin-bottom:6px">发布信息</div>
      <table style="width:100%;font-size:.83rem;border-collapse:collapse">
        ${rowHTML('标题', pi.title)}
        ${rowHTML('副标题', pi.subtitle)}
        ${rowHTML('发布组', pi.group_name)}
        ${rowHTML('分类', pi.category)}
        ${rowHTML('来源', pi.source)}
        ${rowHTML('分辨率', vm.resolution || pi.resolution)}
        ${rowHTML('视频编码', vm.codec || pi.video_codec)}
        ${rowHTML('音频编码', pi.audio_codec)}
        ${rowHTML('字幕', pi.subtitle_type)}
        ${rowHTML('标签', pi.tags)}
      </table>
    </div>
    <div style="margin-bottom:16px">
      <div class="info-label" style="margin-bottom:6px">简介</div>
      <div style="background:var(--bg-input);padding:10px;border-radius:var(--radius-sm);white-space:pre-wrap;font-size:.82rem;line-height:1.6;max-height:200px;overflow-y:auto">${esc(pi.description || '(空)')}</div>
    </div>
    <div>
      <div class="info-label" style="margin-bottom:6px">Torrent</div>
      <table style="width:100%;font-size:.83rem;border-collapse:collapse">
        ${rowHTML('大小', ti.total_size ? fmtBytes(ti.total_size) : '-')}

  `;
  $('previewModal').classList.add('show');
}

function closePreviewModal() {
  $('previewModal').classList.remove('show');
}

function onSiteChange() {}

// ═══ 初始化 ═══
async function init() {
  addLog('BT 发布控制台初始化中...', 'INFO');
  try {
    await Promise.all([loadTasks(), loadSites()]);
    addLog('系统就绪', 'INFO');
  } catch (e) {
    addLog(`初始化失败: ${e.message}`, 'ERROR');
  }
}

init();
</script>
